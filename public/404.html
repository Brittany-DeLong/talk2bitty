<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Bitty Portal</title>
    <style>
        :root {
            --bg-solid: #000000;
            --block-bg: #0b0c10;
            --pink-jewel: #d946ef;
            --teal-jewel: #0d9488;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background-color: var(--bg-solid);
            background-image:
                linear-gradient(var(--teal-jewel) 1px, transparent 1px),
                linear-gradient(90deg, var(--pink-jewel) 1px, transparent 1px);
            background-size: 100px 100px;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        main {
            width: min(100%, 620px);
            background: var(--block-bg);
            border: 2px solid var(--pink-jewel);
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.2);
            border-radius: 4px;
            padding: 48px 32px;
            box-sizing: border-box;
            text-align: center;
        }

        .error-code {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--teal-jewel), var(--pink-jewel));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 16px;
            letter-spacing: 2px;
        }

        h1 {
            color: var(--pink-jewel);
            margin: 0 0 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.8rem;
        }

        p {
            color: var(--text-muted);
            line-height: 1.7;
            margin: 0 0 32px;
            font-size: 1rem;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--teal-jewel);
            color: #000;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(13, 148, 136, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--pink-jewel);
            border: 2px solid var(--pink-jewel);
        }

        .btn-secondary:hover {
            background: rgba(217, 70, 239, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        
        <div class="button-group">
            <a href="/" class="btn-primary">Back to Portal</a>
            <a href="/dashboard.html" class="btn-secondary">Dashboard</a>
        </div>
    </main>
</body>
</html>
